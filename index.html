<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pingy - SMS Marketing Platform</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <nav>
            <h1>Pingy</h1>
            <ul>
                <li><a href="#features">Features</a></li>
                <li><a href="#contact">Contact</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section>
            <div class="hero">
                <h2>Professional SMS Marketing Solutions</h2>
                <p>Boost your business with our comprehensive SMS marketing platform.</p>
                <a href="#contact" class="btn">Get Started</a>
            </div>
        </section>
        <section id="features">
            <h2>Features</h2>
            <ul>
                <li>Feature 1: SMS Campaigns</li>
                <li>Feature 2: Analytics</li>
                <li>Feature 3: Contact Management</li>
            </ul>
        </section>
        <section id="contact">
            <h2>Contact Us</h2>
            <form>
                <label for="name">Name:</label>
                <input type="text" id="name" name="name" required>
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required>
                <label for="message">Message:</label>
                <textarea id="message" name="message" required></textarea>
                <button type="submit">Send</button>
            </form>
        </section>
    </main>
    <footer>
        <p>&copy; 2026 Pingy. All rights reserved.</p>
    </footer>
</body>
</html>
